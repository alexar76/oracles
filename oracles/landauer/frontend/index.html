<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landauer — Erasure Furnace</title>
<style>
  html,body{margin:0;height:100%;background:#06060a;overflow:hidden;cursor:default}
  canvas{display:block}
  .ui{position:fixed;left:28px;top:22px;font-family:"Iowan Old Style",Georgia,serif;
       color:#ffd9c2;pointer-events:none;text-shadow:0 0 18px rgba(255,90,40,.45)}
  .ui h1{margin:0;font-size:30px;letter-spacing:.42em;font-weight:500;
         background:linear-gradient(90deg,#7fd0ff,#ffb24a,#ff2d1a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ui p{margin:.5em 0 0;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.22em;color:#9a7a66;opacity:.85}
  .hud{position:fixed;right:26px;bottom:20px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
       letter-spacing:.12em;color:#9a7a66;opacity:.85;text-align:right;pointer-events:none;white-space:pre}
  .mode{position:fixed;left:28px;bottom:20px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
        letter-spacing:.16em;opacity:.9;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui"><h1>LANDAUER</h1><p>ERASURE FURNACE · kT·ln2 PER BIT DESTROYED</p></div>
<div class="hud" id="hud"></div>
<div class="mode" id="mode"></div>
<script>
const cv=document.getElementById("c"),x=cv.getContext("2d"),hud=document.getElementById("hud"),modeEl=document.getElementById("mode");
let W,H,DPR;
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+"px";cv.style.height=H+"px";x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);resize();

// --- a small layered op-DAG, left → right. Each gate has a type + a column.
// irreversible gates (and/or/erase) flash red and eject a kT·ln2 heat quantum upward.
// reversible mode reroutes the same logic through Toffoli/Fredkin → plume collapses.
const KB_LN2=2.85; // zJ per bit, for the HUD
let gates=[],wires=[],heat=[],tokens=[];
let COLS=6, perCol=4;

function buildDAG(){
  gates=[];wires=[];
  // build a layered grid of gates; mark a fraction irreversible
  for(let c=0;c<COLS;c++){
    const cnt= c===0?perCol : (c===COLS-1?2:perCol-((c%2)));
    for(let r=0;r<cnt;r++){
      const isIn=c===0, isOut=c===COLS-1;
      // irreversibility: interior reductions; inputs/outputs reversible
      let irr = !isIn && !isOut && ((c+r)%2===0);
      const type = isIn?"IN":isOut?"OUT":(irr?(["AND","OR","NAND"][(c+r)%3]):(["NOT","COPY","CNOT"][(c+r)%3]));
      gates.push({c,r,cnt,type,irr,flash:0});
    }
  }
  // wires: connect each interior/out gate to two predecessors in the previous column
  const byCol={};gates.forEach((g,i)=>{(byCol[g.c]=byCol[g.c]||[]).push(i);});
  for(let c=1;c<COLS;c++){
    for(const i of byCol[c]){
      const prev=byCol[c-1];
      const a=prev[(gates[i].r)%prev.length], b=prev[(gates[i].r+1)%prev.length];
      wires.push([a,i]);if(b!==a)wires.push([b,i]);
    }
  }
}
function gx(g){const pad=120;return pad+g.c*((W-2*pad)/(COLS-1));}
function gy(g){const top=120,bot=H-150;const span=bot-top;return top+(g.cnt===1?span/2:(g.r+0.5)*span/g.cnt);}

let t0=performance.now(),reversible=false,switchAt=0,pulse=0;
function spawnToken(wi){const [a,b]=wires[wi];tokens.push({wi,p:0,sp:0.012+Math.random()*0.01});}
function ejectHeat(g){const X=gx(g),Y=gy(g);for(let k=0;k<3;k++)heat.push({x:X+(Math.random()-0.5)*10,y:Y-6,vy:-0.6-Math.random()*0.7,vx:(Math.random()-0.5)*0.3,life:1,r:2+Math.random()*2});}

buildDAG();
for(let i=0;i<wires.length;i++)if(Math.random()<0.5)spawnToken(i);

function frame(now){
  const dt=(now-t0)/16.67;t0=now;pulse+=0.04;
  // mode auto-toggle every ~6s
  if(now-switchAt>6000){reversible=!reversible;switchAt=now;}
  x.globalCompositeOperation="source-over";x.fillStyle="rgba(6,6,10,0.30)";x.fillRect(0,0,W,H);

  // count irreversible bits for HUD (interior lossy gates each ~1 bit; collapsed in reversible mode)
  let irrCount=gates.filter(g=>g.irr).length;
  let activeBits = reversible? Math.max(2, Math.round(irrCount*0.18)) : irrCount; // reversible collapses to necessary floor

  // --- wires
  x.globalCompositeOperation="lighter";x.lineWidth=1.1;
  for(const [a,b] of wires){
    const ga=gates[a],gb=gates[b];
    x.strokeStyle="rgba(127,208,255,0.14)";
    x.beginPath();x.moveTo(gx(ga),gy(ga));
    const mx=(gx(ga)+gx(gb))/2;
    x.bezierCurveTo(mx,gy(ga),mx,gy(gb),gx(gb),gy(gb));x.stroke();
  }

  // --- tokens travel along wires; on arrival at an irreversible gate, flash + eject heat
  for(const tk of tokens){
    tk.p+=tk.sp*dt;
    const [a,b]=wires[tk.wi];const ga=gates[a],gb=gates[b];
    const mx=(gx(ga)+gx(gb))/2,P=tk.p,iP=1-P;
    const X=iP*iP*iP*gx(ga)+3*iP*iP*P*mx+3*iP*P*P*mx+P*P*P*gx(gb);
    const Y=iP*iP*iP*gy(ga)+3*iP*iP*P*gy(ga)+3*iP*P*P*gy(gb)+P*P*P*gy(gb);
    const col= "#7fd0ff";
    x.fillStyle=col;x.shadowBlur=10;x.shadowColor=col;
    x.beginPath();x.arc(X,Y,2.6,0,6.2832);x.fill();
    if(tk.p>=1){
      const target=gates[b];
      if(target.irr && !reversible){target.flash=1;ejectHeat(target);}
      tk.p=0;tk.wi=(tk.wi+1)%wires.length;
    }
  }
  x.shadowBlur=0;

  // --- gates
  x.globalCompositeOperation="lighter";
  for(const g of gates){
    const X=gx(g),Y=gy(g);
    const lossy=g.irr && !reversible;
    let base = g.type==="IN"||g.type==="OUT" ? "#5f7a9e"
             : lossy ? "#ff5a28"
             : reversible&&g.irr ? "#a98bff"   // ghostly Toffoli/Fredkin reroute
             : "#7fd0ff";
    const fl=g.flash;
    g.flash=Math.max(0,g.flash-0.05*dt);
    const glow = lossy ? (10+18*fl) : 8;
    x.shadowBlur=glow;x.shadowColor=base;x.fillStyle=base;
    x.beginPath();
    const s=g.type==="IN"||g.type==="OUT"?7:9;
    // diamonds for reversible reroute, squares for lossy, circles for io
    if(reversible&&g.irr){x.moveTo(X,Y-s);x.lineTo(X+s,Y);x.lineTo(X,Y+s);x.lineTo(X-s,Y);x.closePath();}
    else if(lossy){x.rect(X-s,Y-s,2*s,2*s);}
    else{x.arc(X,Y,s*0.8,0,6.2832);}
    x.fill();
    if(lossy&&fl>0.2){x.globalAlpha=fl;x.fillStyle="#fff2d0";x.beginPath();x.rect(X-s,Y-s,2*s,2*s);x.fill();x.globalAlpha=1;}
    // label
    x.shadowBlur=0;x.globalCompositeOperation="source-over";
    x.fillStyle="rgba(255,217,194,0.55)";x.font="9px ui-monospace,Menlo,monospace";x.textAlign="center";
    x.fillText(reversible&&g.irr?(g.r%2?"FRED":"TOFF"):g.type,X,Y+s+12);
    x.globalCompositeOperation="lighter";
  }
  x.shadowBlur=0;

  // --- thermal plume: density ∝ active (Landauer) floor
  x.globalCompositeOperation="lighter";
  const plumeRate = reversible? 0.6 : 2.6;
  if(Math.random()<plumeRate*0.4){
    for(let k=0;k<(reversible?1:3);k++){
      const px=W*0.5+(Math.random()-0.5)*W*0.5;
      heat.push({x:px,y:H-150,vy:-0.5-Math.random()*0.6,vx:(Math.random()-0.5)*0.25,life:1,r:1.5+Math.random()*2.5});
    }
  }
  for(let i=heat.length-1;i>=0;i--){
    const p=heat[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy-=0.004*dt;p.life-=0.006*dt;
    if(p.life<=0||p.y<40){heat.splice(i,1);continue;}
    const a=p.life*0.5;
    const hot=p.life>0.6;
    x.fillStyle=hot?`rgba(255,140,60,${a})`:`rgba(255,70,40,${a*0.7})`;
    x.beginPath();x.arc(p.x,p.y,p.r*(1+(1-p.life)*1.5),0,6.2832);x.fill();
  }
  x.globalCompositeOperation="source-over";

  const floorZ=(activeBits*KB_LN2).toFixed(1);
  const eff = reversible? "0.18→reroute" : (activeBits>0?(Math.max(2,Math.round(irrCount*0.18))/irrCount).toFixed(2):"1.00");
  hud.textContent=`T = 300 K  ·  k·T·ln2 = ${KB_LN2} zJ/bit\nirreversible bits = ${activeBits}\nenergy floor ≈ ${floorZ} zJ`;
  modeEl.style.color=reversible?"#a98bff":"#ff7a4a";
  modeEl.textContent=reversible?"REVERSIBLE MODE · Toffoli/Fredkin · plume collapses to floor"
                                :"IRREVERSIBLE · AND/OR fan-in loses bits · heat ejected";
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
