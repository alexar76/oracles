<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fermat — Least-Time Routing</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;cursor:default}
  canvas{display:block;background:transparent}
  .ui{position:fixed;left:28px;top:22px;font-family:"Iowan Old Style",Georgia,serif;
       color:#d6e9ff;pointer-events:none;text-shadow:0 0 18px rgba(34,211,238,.45)}
  .ui h1{margin:0;font-size:30px;letter-spacing:.42em;font-weight:500;
         background:linear-gradient(90deg,#22d3ee,#7c5cff,#ff2d8a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .ui p{margin:.5em 0 0;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.22em;color:#6f8fc0;opacity:.85}
  .hud{position:fixed;right:26px;bottom:20px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
       letter-spacing:.12em;color:#6f8fc0;opacity:.85;text-align:right;pointer-events:none;white-space:pre}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui"><h1>FERMAT</h1><p>LEAST-TIME ROUTING · THE RAY THAT PROVES ITSELF</p></div>
<div class="hud" id="hud"></div>
<script>
const cv=document.getElementById("c"),x=cv.getContext("2d"),hud=document.getElementById("hud");
let W,H,DPR;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// ---- graph model: nodes are "lenses", edges carry a refractive index n ----
let nodes=[],edges=[],adj=[],src=0,goal=0,T=[],parent=[],path=[],N=0,maxT=1,layoutName="";
const edgeBuf=[];

function addEdge(u,v,n){edgeBuf.push([u,v,n]);}
function lens(x,y,n,col){const i=nodes.length;nodes.push({x,y,n,col});return i;}

function buildLayered(rng,opts){
  const cols=opts.cols||6, bias=opts.bias??0.5;
  const colsArr=[];
  for(let c=0;c<cols;c++){
    const k=2+Math.floor(rng()*3); const arr=[];
    for(let i=0;i<k;i++){
      const y=0.12+0.76*((i+0.5)/k)+(rng()-0.5)*0.05+(bias-0.5)*0.22;
      arr.push(lens(0.07+0.86*(c/(cols-1)),Math.min(0.92,Math.max(0.08,y)),0.2+rng()*0.9,c));
    }
    colsArr.push(arr);
  }
  src=colsArr[0][Math.floor(rng()*colsArr[0].length)];
  goal=colsArr[cols-1][Math.floor(rng()*colsArr[cols-1].length)];
  for(let c=0;c<cols-1;c++){
    for(const u of colsArr[c]){
      const tgts=colsArr[c+1].slice().sort(()=>rng()-0.5).slice(0,1+Math.floor(rng()*2));
      if(c+2<cols && rng()<0.45) tgts.push(colsArr[c+2][Math.floor(rng()*colsArr[c+2].length)]);
      for(const v of tgts){
        const dist=Math.hypot(nodes[v].x-nodes[u].x,nodes[v].y-nodes[u].y);
        addEdge(u,v,+(dist*(0.55+0.95*nodes[v].n)).toFixed(4));
      }
    }
  }
}

function buildDiamond(){
  // classic least-time demo: tempting top ray vs heavy bottom vs expensive direct
  src=lens(0.08,0.5,0.1,0); const a=lens(0.38,0.22,0.15,1); const b=lens(0.38,0.78,0.85,1);
  const c=lens(0.62,0.22,0.18,2); const d=lens(0.62,0.78,0.9,2); goal=lens(0.92,0.5,0.1,3);
  addEdge(src,a,0.55); addEdge(a,c,0.5); addEdge(c,goal,0.55);
  addEdge(src,b,0.7); addEdge(b,d,2.8); addEdge(d,goal,2.6);
  addEdge(src,goal,4.2); addEdge(a,d,1.4); addEdge(b,c,1.6);
  layoutName="diamond · top ray wins";
}

function buildBridge(){
  // two cliques + narrow bridge: optimal snakes through the bridge
  const left=[lens(0.1,0.3,0.2,0),lens(0.1,0.7,0.25,0)];
  const mid=[lens(0.5,0.5,0.15,1)];
  const right=[lens(0.9,0.35,0.2,2),lens(0.9,0.65,0.22,2)];
  src=left[0]; goal=right[1];
  addEdge(left[0],left[1],0.35); addEdge(right[0],right[1],0.35);
  addEdge(left[0],mid[0],0.9); addEdge(left[1],mid[0],1.1);
  addEdge(mid[0],right[0],0.85); addEdge(mid[0],right[1],0.8);
  addEdge(left[0],right[0],3.5); addEdge(left[1],right[1],3.8);
  layoutName="bridge · narrow choke point";
}

function buildZigzag(){
  src=lens(0.07,0.5,0.1,0);
  const a=lens(0.22,0.18,0.2,1), b=lens(0.38,0.82,0.25,2), c=lens(0.55,0.15,0.18,3);
  const d=lens(0.72,0.78,0.22,4), e=lens(0.85,0.25,0.2,5);
  goal=lens(0.93,0.5,0.1,6);
  addEdge(src,a,0.5); addEdge(a,b,0.55); addEdge(b,c,0.5); addEdge(c,d,0.55); addEdge(d,e,0.5); addEdge(e,goal,0.55);
  addEdge(src,goal,5.5); addEdge(a,c,1.2); addEdge(b,d,1.3);
  layoutName="zigzag · bent least-time ray";
}

function buildSkip(){
  src=lens(0.08,0.72,0.1,0); const a=lens(0.28,0.55,0.3,1); const b=lens(0.48,0.38,0.25,2);
  const c=lens(0.68,0.62,0.28,3); goal=lens(0.92,0.45,0.1,4);
  addEdge(src,a,0.45); addEdge(a,b,0.4); addEdge(b,c,0.42); addEdge(c,goal,0.45);
  addEdge(src,b,1.1); addEdge(a,c,0.95); addEdge(b,goal,1.4);
  addEdge(src,goal,4.8);
  layoutName="skip-link · 2-hop shortcut";
}

function build(seed){
  const rng=mulberry32(seed);
  nodes=[]; edgeBuf.length=0;
  const mode=seed%5;
  if(mode===0){ buildLayered(rng,{bias:0.22}); layoutName="upper lane"; }
  else if(mode===1){ buildLayered(rng,{bias:0.78}); layoutName="lower lane"; }
  else if(mode===2) buildDiamond();
  else if(mode===3) buildBridge();
  else buildSkip();
  N=nodes.length;
  adj=nodes.map(()=>[]); edges=[];
  for(const [u,v,n] of edgeBuf){ adj[u].push([v,n]); edges.push([u,v,n]); }
  dijkstra();
}
function dijkstra(){
  T=new Array(N).fill(Infinity); parent=new Array(N).fill(-1); T[src]=0;
  // simple array PQ (N is tiny)
  const done=new Array(N).fill(false);
  for(let it=0;it<N;it++){
    let u=-1,bd=Infinity;
    for(let i=0;i<N;i++) if(!done[i]&&T[i]<bd){bd=T[i];u=i;}
    if(u<0) break; done[u]=true;
    for(const [v,w] of adj[u]) if(T[u]+w<T[v]){T[v]=T[u]+w; parent[v]=u;}
  }
  path=[]; let cur=goal;
  if(T[goal]<Infinity){ while(cur!==-1){path.push(cur); if(cur===src)break; cur=parent[cur];} path.reverse(); }
  maxT=Math.max(...T.filter(v=>v<Infinity),1e-6);
}

function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+"px";cv.style.height=H+"px";x.setTransform(DPR,0,0,DPR,0,0);}
addEventListener("resize",resize);resize();build(20260622);

const pad=80, PX=u=>pad+nodes[u].x*(W-2*pad), PY=u=>pad+nodes[u].y*(H-2*pad);
const WF_SEC=1.2, HOLD_SEC=1.6, CYCLE_SEC=WF_SEC+HOLD_SEC;
let t0=performance.now(), graphId=-1;

function lensColor(n){ // tint by refractive index: low=cyan, high=violet
  const h=190+ Math.min(1,n/1.1)*80; return `hsl(${h} 90% 62%)`;
}
function frame(now){
  const elapsed=(now-t0)/1000;
  const gid=Math.floor(elapsed/CYCLE_SEC);
  const phase=elapsed-gid*CYCLE_SEC;
  if(gid!==graphId){ graphId=gid; build((20260622+gid*2654435761)>>>0); }
  const wf=Math.min(1, phase/WF_SEC);
  const front=wf*maxT*1.15;
  const arrived=front>=T[goal];

  x.globalCompositeOperation="source-over";x.fillStyle="rgba(4,6,11,0.11)";x.fillRect(0,0,W,H);

  // ---- Huygens wavefronts: concentric arcs = eikonal level-sets T(v)=const ----
  x.globalCompositeOperation="lighter";
  const sx=PX(src), sy=PY(src);
  for(let ring=0; ring<10; ring++){
    const lvl=front-ring*0.07*maxT; if(lvl<=0) continue;
    const rr=lvl/maxT*Math.hypot(W,H)*0.62;
    const a=Math.max(0,0.16-ring*0.016);
    x.strokeStyle=`rgba(34,211,238,${a})`; x.lineWidth=1.2;
    x.beginPath(); x.arc(sx,sy,rr,-Math.PI*0.62,Math.PI*0.62); x.stroke();
  }

  // ---- all edges: faint optical table; ghost the non-optimal ones ----
  const onPath=new Set(); for(let i=0;i<path.length-1;i++) onPath.add(path[i]+"_"+path[i+1]);
  x.lineWidth=1;
  for(const [u,v,n] of edges){
    const key=u+"_"+v, ghost=!onPath.has(key);
    const reached=T[u]<Infinity && front>=T[u];
    x.strokeStyle = ghost
      ? `rgba(120,140,190,${reached?0.10:0.05})`
      : `rgba(124,92,255,0.18)`;
    x.beginPath(); x.moveTo(PX(u),PY(u)); x.lineTo(PX(v),PY(v)); x.stroke();
  }

  // ---- the bright bent ray (Snell-kinks at each lens) once wavefront reaches goal ----
  if(path.length>1){
    // reveal ray progressively with the wavefront
    const reach = arrived ? 1 : Math.max(0, Math.min(1, front/T[goal]));
    const segs=path.length-1, show=reach*segs;
    x.lineWidth=2.4; x.strokeStyle="rgba(34,211,238,0.95)"; x.shadowBlur=16; x.shadowColor="#22d3ee";
    x.beginPath(); x.moveTo(PX(path[0]),PY(path[0]));
    for(let i=0;i<segs;i++){
      const f=Math.max(0,Math.min(1,show-i));
      const ax=PX(path[i]),ay=PY(path[i]),bx=PX(path[i+1]),by=PY(path[i+1]);
      x.lineTo(ax+(bx-ax)*f, ay+(by-ay)*f);
      if(f<1) break;
    }
    x.stroke(); x.shadowBlur=0;
  }

  // ---- lenses (nodes): glowing, tint = refractive index; source & goal special ----
  for(let i=0;i<N;i++){
    const reached = T[i]<Infinity && front>=T[i];
    const isPath = path.includes(i);
    const c = i===src? "#7c5cff" : i===goal? "#ff2d8a" : lensColor(nodes[i].n);
    const r = i===src||i===goal? 8 : (isPath?6:4.5);
    x.save(); x.translate(PX(i),PY(i));
    // lens body: an ellipse, brighter once the wavefront has reached it
    x.globalAlpha = reached? 1 : 0.4;
    x.shadowBlur = reached? (isPath?20:12) : 5; x.shadowColor=c;
    x.fillStyle=c; x.beginPath(); x.ellipse(0,0,r,r*1.6,0,0,6.2832); x.fill();
    x.restore();
  }
  x.shadowBlur=0; x.globalCompositeOperation="source-over";

  const total = T[goal]<Infinity? T[goal].toFixed(3):"∞";
  hud.textContent =
    `${layoutName}  ·  graph #${graphId+1}\n`+
    `nodes ${N}  ·  hops ${Math.max(0,path.length-1)}  ·  T(goal)=${total}\n`+
    (arrived? `RAY LOCKED · optimal total = ${total}` : `expanding wavefront…`);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
<script src="../cosmic-bg.js"></script>
</body>
</html>
